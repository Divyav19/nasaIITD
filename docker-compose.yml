version: '3.9'

services:
  aether-acm:
    build:
      context: .
      dockerfile: Dockerfile
    image: aether-acm:latest
    container_name: aether-acm
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
